services:
  db:
    image: postgres:16
    container_name: finance-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: finance-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/finance?sslmode=disable
      JWT_SECRET: 2f3a650cfb2b8643114884cbdeb966366e7ac762eed2c0b95017bcd9020e26ec6753b94a0564d5c28db007584624e1540b9b04c3d74df4ebe5035f9491998ee3

volumes:
  postgres_data: